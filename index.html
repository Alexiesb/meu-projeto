<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gatinhos Aleatórios 🐱</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="paw-icon">🐾</div>
        <h1>Gatinhos Aleatórios</h1>
        <p class="subtitle">Clique no botão e receba um gatinho surpresa!</p>
      </header>

      <main>
        <div class="card" id="card">
          <div class="image-wrapper" id="imageWrapper">
            <div class="placeholder" id="placeholder">
              <span class="placeholder-icon">🐱</span>
              <p>Seu gatinho aparecerá aqui</p>
            </div>
            <img
              id="catImage"
              class="cat-image hidden"
              alt="Imagem aleatória de um gatinho"
            />
            <div class="loading hidden" id="loading">
              <div class="spinner"></div>
              <p>Buscando gatinho...</p>
            </div>
          </div>

          <div class="card-footer">
            <p id="errorMessage" class="error hidden">
              😿 Ops! Não foi possível carregar a imagem. Tente novamente.
            </p>
            <button id="fetchBtn" class="btn">
              <span class="btn-icon">🐾</span>
              Buscar Gatinho
            </button>
            <button id="downloadBtn" class="btn btn-secondary hidden">
              <span class="btn-icon">💾</span>
              Salvar Imagem
            </button>
          </div>
        </div>

        <div class="counter" id="counter">
          <span id="countNumber">0</span> gatinhos visitados
        </div>
      </main>

      <footer>
        <p>Imagens fornecidas pela <a href="https://thecatapi.com" target="_blank" rel="noopener">The Cat API</a> 🐈</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
